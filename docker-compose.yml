version: '3.9'

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    command: ["--wiredTigerCacheSizeGB", "1"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping')"]
      interval: 20s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: ./server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/hyperlocal
      - REDIS_URL=redis://redis:6379
      - PUBLIC_URL=${PUBLIC_URL:-https://www.zappyone.com}
      - CLIENT_URL=https://www.zappyone.com
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Scale with:  docker compose up --scale api=3
    deploy:
      replicas: 2

  dispatch-worker:
    build: ./server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/hyperlocal
      - REDIS_URL=redis://redis:6379
      - PUBLIC_URL=${PUBLIC_URL:-https://www.zappyone.com}
      - CLIENT_URL=https://www.zappyone.com
    command: ["node", "src/jobs/dispatch.worker.js"]
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  notifications-worker:
    build: ./server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/hyperlocal
      - REDIS_URL=redis://redis:6379
    command: ["node", "src/jobs/notifications.worker.js"]
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  stale-order-worker:
    build: ./server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/hyperlocal
      - REDIS_URL=redis://redis:6379
    command: ["node", "src/jobs/stale-order.worker.js"]
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        VITE_ADMIN_SLUG: ${VITE_ADMIN_SLUG}
        VITE_CASHFREE_ENV: ${VITE_CASHFREE_ENV}
        VITE_GOOGLE_MAPS_KEY: ${VITE_GOOGLE_MAPS_KEY}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/letsencrypt:ro     # mount your Let's Encrypt certs here
      - ./deploy/certbot-www:/var/www/certbot
    depends_on:
      - api
      - client

volumes:
  mongo-data:
  redis-data:

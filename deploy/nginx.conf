# ============================================================================
# Edge Nginx — reverse proxy for the whole platform.
#
# Responsibilities:
#   - TLS termination (certs mounted under /etc/letsencrypt)
#   - Route /api and /socket.io to API nodes
#   - Use ip_hash to pin WebSocket clients to the same API node
#     (Socket.io's Redis adapter still lets cross-node messaging work;
#      ip_hash just avoids reconnect churn for long-lived WS connections)
#   - Serve the static SPA from a local volume or upstream client container
# ============================================================================

upstream api_nodes {
  ip_hash;
  # Add as many API replicas as you have. docker-compose can scale `api`.
  server api:4000;
  # server api2:4000;
  # server api3:4000;
  keepalive 64;
}

upstream client_nodes {
  server client:80;
  keepalive 32;
}

# HTTP → HTTPS
server {
  listen 80;
  server_name _;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl http2;
  server_name _;

  ssl_certificate     /etc/letsencrypt/live/zappyone.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/zappyone.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  client_max_body_size 10M;

  # --- SEO pages (served by Express, not the SPA) ---
  location ~ ^/(sitemap\.xml|robots\.txt) {
    proxy_pass http://api_nodes;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=3600";
  }

  location /in/ {
    proxy_pass http://api_nodes;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=86400, stale-while-revalidate=3600";
  }

  # --- API ---
  location /api/ {
    proxy_pass http://api_nodes;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
  }

  # --- Socket.io (WebSockets) ---
  location /socket.io/ {
    proxy_pass http://api_nodes;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;   # long-lived WS
    proxy_send_timeout 3600s;
  }

  # --- SPA client ---
  location / {
    proxy_pass http://client_nodes;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}
